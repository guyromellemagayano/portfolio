name: portfolio

services:
  web:
    image: portfolio/web:local
    container_name: portfolio-web
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: >
      sh -lc "CI=true pnpm install --frozen-lockfile &&
      pnpm --filter web dev"
    environment:
      NODE_ENV: development
      SITE_URL_DEVELOPMENT: ${SITE_URL_DEVELOPMENT:-http://portfolio.local:4321}
      SITE_URL_PREVIEW: ${SITE_URL_PREVIEW:-}
      SITE_URL_PRODUCTION: ${SITE_URL_PRODUCTION:-https://www.guyromellemagayano.com}
      WEB_HOST: ${WEB_HOST:-0.0.0.0}
      WEB_PORT: ${WEB_PORT:-4321}
      E2E_BASE_URL: ${E2E_BASE_URL:-${SITE_URL_DEVELOPMENT:-http://portfolio.local:4321}}
      E2E_USE_EXTERNAL_SERVERS: "1"
    expose:
      - "${WEB_PORT:-4321}"
    init: true
    labels:
      - dev.orbstack.domains=portfolio.local
      - dev.orbstack.http-port=${WEB_PORT:-4321}
    ports:
      - "127.0.0.1:${WEB_PORT:-4321}:${WEB_PORT:-4321}"
    volumes:
      - .:/workspace
      - portfolio-pnpm-store:/pnpm/store
      - portfolio-root-node-modules:/workspace/node_modules
      - portfolio-e2e-node-modules:/workspace/apps/e2e/node_modules
      - portfolio-web-node-modules:/workspace/apps/web/node_modules
      - portfolio-components-node-modules:/workspace/packages/components/node_modules
      - portfolio-config-commit-node-modules:/workspace/packages/config-commit/node_modules
      - portfolio-config-eslint-node-modules:/workspace/packages/config-eslint/node_modules
      - portfolio-config-typescript-node-modules:/workspace/packages/config-typescript/node_modules
      - portfolio-hooks-node-modules:/workspace/packages/hooks/node_modules
      - portfolio-logger-node-modules:/workspace/packages/logger/node_modules
      - portfolio-ui-node-modules:/workspace/packages/ui/node_modules
      - portfolio-utils-node-modules:/workspace/packages/utils/node_modules
      - portfolio-vitest-presets-node-modules:/workspace/packages/vitest-presets/node_modules
    working_dir: /workspace

volumes:
  portfolio-pnpm-store:
  portfolio-root-node-modules:
  portfolio-e2e-node-modules:
  portfolio-web-node-modules:
  portfolio-components-node-modules:
  portfolio-config-commit-node-modules:
  portfolio-config-eslint-node-modules:
  portfolio-config-typescript-node-modules:
  portfolio-hooks-node-modules:
  portfolio-logger-node-modules:
  portfolio-ui-node-modules:
  portfolio-utils-node-modules:
  portfolio-vitest-presets-node-modules:
