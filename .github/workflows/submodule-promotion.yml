name: Submodule Promotion

on:
  workflow_dispatch:
    inputs:
      silo:
        description: "Silo id or path from tooling/repos.manifest.json"
        required: true
        type: string
      ref:
        description: "Child repo SHA, branch, or tag to promote"
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.silo }}

jobs:
  promote:
    name: Promote Submodule
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ssh-key: ${{ secrets.PORTFOLIO_SUBMODULE_SSH_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate silo manifest
        run: pnpm exec node scripts/validate-silo-manifest.mjs

      - name: Promote silo ref
        run: pnpm exec node scripts/update-submodule-pointer.mjs --silo "${{ github.event.inputs.silo }}" --ref "${{ github.event.inputs.ref }}"

      - name: Run integration checks
        run: |
          pnpm check-types
          pnpm build
          pnpm test:run

      - name: Create promotion pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/promote-${{ github.event.inputs.silo }}-${{ github.run_id }}
          commit-message: |
            chore(submodules): promote `${{ github.event.inputs.silo }}`

            - promote `${{ github.event.inputs.silo }}` to `${{ github.event.inputs.ref }}`
            - validate the quiet-submodule control plane before opening the PR
          title: "chore(submodules): promote `${{ github.event.inputs.silo }}`"
          body: |
            Promotes `${{ github.event.inputs.silo }}` to `${{ github.event.inputs.ref }}`.

            This PR was created by the quiet-submodule promotion workflow after validating the root control plane and running the root integration checks.
