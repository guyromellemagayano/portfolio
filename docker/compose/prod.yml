services:
  api:
    build:
      context: ../..
      dockerfile: docker/images/api-portfolio/production.Dockerfile
    image: portfolio-api:production
    container_name: portfolio-api-prod
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORTFOLIO_API_CONTENT_PROVIDER: ${PORTFOLIO_API_CONTENT_PROVIDER:-local}
      API_PORT: "5001"
      PORT: "5001"
      PORTFOLIO_API_CORS_ORIGINS: ${PORTFOLIO_API_CORS_ORIGINS:-}
    ports:
      - "${PROD_API_PORT:-5001}:5001"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:5001/v1/status').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: docker/images/web/production.Dockerfile
    image: portfolio-web:production
    container_name: portfolio-web-prod
    init: true
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      PORTFOLIO_API_URL: http://api:5001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      CONTENT_REVALIDATE_SECRET: ${CONTENT_REVALIDATE_SECRET:-}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${PROD_WEB_PORT:-3000}:3000"
    volumes:
      - web-next-cache:/app/.next/cache
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

volumes:
  web-next-cache:
